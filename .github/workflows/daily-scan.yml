name: 🏴‍☠️ AgentScore Daily Scan

on:
  schedule:
    # 毎日 UTC 00:00 (JST 09:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: agentscore
        run: npm ci

      - name: Run batch scan
        working-directory: agentscore
        run: node src/cli.js batch targets.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send scan results to telemetry server
        working-directory: agentscore
        run: |
          # スキャン結果のJSONファイルを読み込んでテレメトリ送信
          SESSION_ID="daily-scan-$(date +%Y%m%d-%H%M%S)"
          BATCH="[]"
          
          for report in reports/*.json; do
            [ -f "$report" ] || continue
            
            # 各レポートファイルからデータポイントを生成
            SERVER_NAME=$(basename "$report" .json)
            
            BATCH=$(node -e "
              const fs = require('fs');
              const batch = JSON.parse(process.argv[1]);
              try {
                const report = JSON.parse(fs.readFileSync('$report', 'utf8'));
                const dp = {
                  event_type: 'quality_scan',
                  tool_name: report.server_name || '$SERVER_NAME',
                  source: 'daily-scan',
                  session_id: '$SESSION_ID',
                  scan_score: report.overall_score || report.score || 0,
                  scan_grade: report.grade || 'unknown',
                  tools_count: report.tools_count || (report.tools ? report.tools.length : 0),
                  latency_ms: report.scan_duration_ms || report.latency_ms || 0,
                  input_size: 0,
                  output_size: JSON.stringify(report).length,
                  scan_categories: report.categories || {},
                  timestamp: new Date().toISOString()
                };
                batch.push(dp);
              } catch(e) {
                console.error('Skip', '$report', e.message);
              }
              console.log(JSON.stringify(batch));
            " "$BATCH")
          done
          
          # テレメトリサーバーに一括送信
          BATCH_SIZE=$(node -e "console.log(JSON.parse(process.argv[1]).length)" "$BATCH")
          echo "📡 Sending $BATCH_SIZE data points to telemetry server..."
          
          if [ "$BATCH_SIZE" -gt "0" ]; then
            PAYLOAD=$(node -e "
              console.log(JSON.stringify({
                batch: JSON.parse(process.argv[1]),
                source: 'daily-scan',
                session_id: '$SESSION_ID'
              }));
            " "$BATCH")
            
            RESPONSE=$(curl -s -X POST \
              https://agentvault-telemetry.onrender.com/api/telemetry \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD" \
              --max-time 30)
            
            echo "📊 Telemetry response: $RESPONSE"
          else
            echo "⚠️ No scan results to send"
          fi

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: agentscore-report-${{ github.run_number }}
          path: agentscore/reports/
          retention-days: 90

      - name: Commit updated scores
        run: |
          git config user.name "AgentScore Bot"
          git config user.email "bot@agentvault.dev"
          git add agentscore/reports/
          git diff --staged --quiet || git commit -m "📊 Daily scan: $(date +%Y-%m-%d)"
          git push || true
